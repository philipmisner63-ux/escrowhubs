name: Contracts CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'contracts/**'
  pull_request:
    paths:
      - 'contracts/**'

jobs:
  test:
    name: Compile & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        working-directory: contracts
        run: pnpm install

      - name: Compile contracts
        working-directory: contracts
        run: pnpm compile

      - name: Run tests
        working-directory: contracts
        run: pnpm test

