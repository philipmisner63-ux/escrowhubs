specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: EscrowFactory
    network: base
    source:
      address: "0x93e86fac9a15add437363f7bbec776bdbc932411"
      abi: EscrowFactory
      startBlock: 44194000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Escrow
        - GlobalStats
      abis:
        - name: EscrowFactory
          file: ./abis/EscrowFactory.json
      eventHandlers:
        - event: SimpleEscrowCreated(indexed address,indexed address,indexed address,address,uint256,uint256,uint8,bool,address)
          handler: handleSimpleEscrowCreated
        - event: MilestoneEscrowCreated(indexed address,indexed address,indexed address,address,uint256,uint256,uint8,bool,address)
          handler: handleMilestoneEscrowCreated
      file: ./src/factory.ts

  - kind: ethereum
    name: AIArbiter
    network: base
    source:
      address: "0x79e78c1ed9a8e239a8334294bf4f0d356f858416"
      abi: AIArbiter
      startBlock: 44194000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Dispute
        - Escrow
      abis:
        - name: AIArbiter
          file: ./abis/AIArbiter.json
      eventHandlers:
        - event: EvidenceSubmitted(indexed address,indexed address,string)
          handler: handleEvidenceSubmitted
        - event: DisputeResolved(indexed address,string)
          handler: handleDisputeResolved
      file: ./src/arbiter.ts

  - kind: ethereum
    name: TrustScoreOracle
    network: base
    source:
      address: "0xf2612fddf7505f6d168c1cbe8b725f3449ea535e"
      abi: TrustScoreOracle
      startBlock: 44194000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TrustScoreChange
        - WalletTrustScore
      abis:
        - name: TrustScoreOracle
          file: ./abis/TrustScoreOracle.json
      eventHandlers:
        - event: ScoreUpdated(indexed address,uint8)
          handler: handleScoreUpdated
      file: ./src/oracle.ts

templates:
  - kind: ethereum
    name: SimpleEscrow
    network: base
    source:
      abi: SimpleEscrow
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Escrow
        - FundRelease
        - Dispute
        - GlobalStats
      abis:
        - name: SimpleEscrow
          file: ./abis/SimpleEscrow.json
      eventHandlers:
        - event: Deposited(indexed address,uint256)
          handler: handleDeposited
        - event: Released(indexed address,uint256)
          handler: handleReleased
        - event: Refunded(indexed address,uint256)
          handler: handleRefunded
        - event: Disputed(indexed address)
          handler: handleDisputed
      file: ./src/escrow.ts

  - kind: ethereum
    name: MilestoneEscrow
    network: base
    source:
      abi: MilestoneEscrow
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Escrow
        - MilestoneRelease
        - Dispute
        - GlobalStats
      abis:
        - name: MilestoneEscrow
          file: ./abis/MilestoneEscrow.json
      eventHandlers:
        - event: Funded(uint256)
          handler: handleFunded
        - event: MilestoneReleased(indexed uint256,uint256)
          handler: handleMilestoneReleased
        - event: MilestoneDisputed(indexed uint256)
          handler: handleMilestoneDisputed
        - event: MilestoneRefunded(indexed uint256,uint256)
          handler: handleMilestoneRefunded
      file: ./src/escrow.ts
